<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a1429">
<title>SeaKingsGames · Arcada</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SeaKings">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="Arcada de juegos casuales en español: Tuercas Locas, Verdugo, Memoria, Snake y más.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg-0:#050d1f; --bg-1:#0a1429; --bg-2:#142545;
    --gold:#ffc83a; --gold-deep:#b88300;
    --cyan:#38e2d0; --coral:#ff6b6b;
    --text:#fff; --text-dim:#8fa4c8;
    --line:rgba(143,164,200,.18);
  }
  html,body{min-height:100%}
  body{
    font-family:'Fredoka',system-ui,sans-serif;
    background:var(--bg-1); color:var(--text); overflow-x:hidden;
    padding-bottom:80px; /* espacio para banner fijo */
  }

  .bg-fx{
    position:fixed;inset:0;z-index:-1;overflow:hidden;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%,rgba(56,226,208,.12) 0%,transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 100%,rgba(255,200,58,.08) 0%,transparent 70%),
      linear-gradient(180deg,var(--bg-0) 0%,var(--bg-1) 40%,var(--bg-2) 100%);
  }
  .bg-fx::before{
    content:'';position:absolute;inset:0;
    background-image:
      radial-gradient(circle at 20% 30%,rgba(255,255,255,.06) 1px,transparent 1.5px),
      radial-gradient(circle at 70% 60%,rgba(255,255,255,.04) 1px,transparent 1.5px),
      radial-gradient(circle at 85% 20%,rgba(255,255,255,.05) 1px,transparent 1.5px),
      radial-gradient(circle at 40% 80%,rgba(255,255,255,.04) 1px,transparent 1.5px);
    background-size:300px 300px, 400px 400px, 250px 250px, 350px 350px;
    animation:drift 60s linear infinite;
  }
  @keyframes drift{to{background-position:300px 300px, -400px 400px, 250px -250px, -350px 350px}}

  /* HEADER */
  header{padding:calc(env(safe-area-inset-top) + 28px) 22px 24px;text-align:center;position:relative}
  .crown{font-size:42px;margin-bottom:6px;display:inline-block;animation:bob 3s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-6px) rotate(3deg)}}
  h1.brand{
    font-family:'Bagel Fat One',sans-serif;
    font-size:clamp(40px,12vw,68px);line-height:.9;
    background:linear-gradient(180deg,#fff 0%,#ffd864 60%,#b88300 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 4px 20px rgba(255,200,58,.25);letter-spacing:1px;
  }
  h1.brand .sea{color:#fff;-webkit-text-fill-color:#fff}
  .tag{margin-top:10px;color:var(--text-dim);font-size:14px;letter-spacing:4px;font-weight:500;text-transform:uppercase}
  .deco-line{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px;color:var(--gold)}
  .deco-line span{height:1px;width:60px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

  /* ---------- AD BANNER 728x90 (solo desktop) ---------- */
  .ad-leaderboard{
    display:none;justify-content:center;padding:14px 20px;
    margin:0 auto;max-width:780px;
  }
  @media (min-width:780px){ .ad-leaderboard{display:flex} }
  .ad-leaderboard iframe{max-width:100%}

  /* SECCIÓN */
  section{padding:24px 18px 12px;max-width:880px;margin:0 auto}
  h2.section-title{
    font-family:'Bagel Fat One',sans-serif;font-size:22px;letter-spacing:1px;
    margin-bottom:14px;padding-left:6px;display:flex;align-items:center;gap:10px;
  }
  h2.section-title::before{
    content:'';width:6px;height:22px;background:var(--gold);border-radius:3px;box-shadow:0 0 12px var(--gold);
  }

  /* CARDS */
  .grid{display:grid;grid-template-columns:1fr;gap:14px}
  @media (min-width:560px){.grid{grid-template-columns:1fr 1fr}}

  .card{
    position:relative;display:block;border-radius:22px;overflow:hidden;
    text-decoration:none;color:inherit;
    background:linear-gradient(180deg,rgba(255,255,255,.05) 0%,rgba(255,255,255,.02) 100%);
    border:1px solid var(--line);box-shadow:0 8px 24px rgba(0,0,0,.3);
    transition:transform .2s ease,box-shadow .2s ease;isolation:isolate;
  }
  .card:active{transform:scale(.98)}
  .card-art{height:160px;display:flex;align-items:center;justify-content:center;font-size:78px;position:relative;overflow:hidden}
  .card-art::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.5) 100%)}
  .card-body{padding:16px 18px 18px;position:relative;z-index:1}
  .card h3{font-size:20px;font-weight:700;margin-bottom:4px}
  .card p{color:var(--text-dim);font-size:14px;line-height:1.45}
  .card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
  .pill{font-size:11px;font-weight:600;letter-spacing:1.5px;padding:5px 10px;border-radius:8px;background:rgba(255,200,58,.15);color:var(--gold)}
  .pill.soon{background:rgba(143,164,200,.15);color:var(--text-dim)}
  .play{
    width:42px;height:42px;border-radius:50%;background:var(--gold);color:#3a2400;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;
    box-shadow:0 4px 0 var(--gold-deep);transition:transform .15s;
  }
  .card:active .play{transform:translateY(2px)}

  .art-tuercas{background:radial-gradient(circle at 50% 40%,#7b3fb8 0%,#2a1855 70%)}
  .art-verdugo{background:radial-gradient(circle at 50% 40%,#5c8fbf 0%,#1c2a3a 70%)}
  .art-memoria{background:radial-gradient(circle at 50% 40%,#a070e0 0%,#1e3a5f 70%)}
  .art-snake  {background:radial-gradient(circle at 50% 40%,#5fc99a 0%,#062813 70%)}
  .art-numpuz {background:radial-gradient(circle at 50% 40%,#5e9ed8 0%,#1a2c3a 70%)}

  /* PWA install prompt */
  .install-prompt{
    position:fixed;bottom:80px;left:16px;right:16px;
    background:linear-gradient(180deg,rgba(255,200,58,.15) 0%,rgba(255,200,58,.05) 100%);
    backdrop-filter:blur(12px);
    border:1px solid var(--gold);
    border-radius:16px;padding:14px 16px;
    box-shadow:0 8px 24px rgba(0,0,0,.4), 0 0 0 1px rgba(255,200,58,.1);
    display:none;align-items:center;gap:12px;
    z-index:60;animation:slideUp .4s cubic-bezier(.34,1.56,.64,1);
    max-width:420px;margin:0 auto;
  }
  .install-prompt.show{display:flex}
  .install-prompt .ico{font-size:28px;flex-shrink:0}
  .install-prompt .txt{flex:1;font-size:13px;color:var(--text-dim);line-height:1.3}
  .install-prompt .txt b{color:#fff;font-size:14px;display:block;margin-bottom:2px}
  .install-prompt button{padding:8px 14px;border-radius:10px;background:var(--gold);color:#3a2400;font-weight:700;font-size:13px;flex-shrink:0;border:none;cursor:pointer;font-family:inherit}
  .install-prompt .close{background:transparent;color:var(--text-dim);padding:4px 8px;font-size:18px}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* Banner "instalado" */
  .installed-badge{
    position:fixed;top:calc(env(safe-area-inset-top) + 14px);left:14px;
    background:rgba(95,201,154,.2);color:var(--cyan);
    padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1px;
    border:1px solid rgba(95,201,154,.3);z-index:30;
    display:none;
  }
  .installed-badge.show{display:block}

  .card.soon{opacity:.7;pointer-events:none}
  .card.soon .card-art{filter:saturate(.3);font-size:60px}

  .card.feature{grid-column:1/-1}
  .card.feature .card-art{height:200px;font-size:100px}
  .card.feature h3{font-size:26px}
  .card.feature::before{
    content:'DESTACADO';position:absolute;top:14px;right:14px;z-index:2;
    background:var(--gold);color:#3a2400;font-size:10px;font-weight:700;letter-spacing:2px;
    padding:5px 10px;border-radius:8px;box-shadow:0 2px 8px rgba(255,200,58,.4);
  }

  /* ---------- AD MEDIUM RECTANGLE 300x250 entre cards ---------- */
  .ad-rectangle{
    margin:24px auto 8px;padding:18px;
    background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01));
    border:1px solid var(--line);border-radius:18px;
    display:flex;flex-direction:column;align-items:center;gap:8px;
    max-width:340px;
  }
  .ad-label{font-size:10px;color:var(--text-dim);opacity:.7;letter-spacing:2px}
  .ad-rectangle iframe{max-width:100%;border:0;display:block}

  /* ---------- AD BANNER 320x50 FIJO ABAJO ---------- */
  .ad-bottom{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    padding:6px 0 calc(env(safe-area-inset-bottom) + 6px);
    background:rgba(5,13,31,.85);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    display:flex;justify-content:center;align-items:center;
    min-height:60px;
  }
  .ad-bottom iframe{max-width:100%;border:0;display:block}

  /* FOOTER */
  footer{text-align:center;padding:24px 20px 12px;color:var(--text-dim);font-size:13px}
  footer .heart{color:var(--coral)}
  footer a{color:var(--cyan);text-decoration:none;font-weight:600}

  /* botón sonido flotante */
  .sound-toggle{
    position:fixed;top:calc(env(safe-area-inset-top) + 14px);right:14px;
    width:42px;height:42px;border-radius:50%;
    background:rgba(255,255,255,.08);backdrop-filter:blur(8px);
    border:1px solid var(--line);
    color:#fff;font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;z-index:30;
  }
</style>
</head>
<body>

<div class="bg-fx"></div>

<button class="sound-toggle" id="sound-toggle" title="Audio">🔊</button>

<header>
  <div class="crown">👑</div>
  <h1 class="brand"><span class="sea">Sea</span>Kings<br>Games</h1>
  <div class="tag">Arcada del rey del mar</div>
  <div class="deco-line"><span></span>⚓<span></span></div>
</header>

<!-- Banner desktop 728x90 -->
<div class="ad-leaderboard" id="ad-top"></div>

<section>
  <h2 class="section-title">Juegos</h2>
  <div class="grid" id="games-grid"></div>

  <!-- Medium rectangle entre juegos y footer -->
  <div class="ad-rectangle">
    <div class="ad-label">PUBLICIDAD</div>
    <div id="ad-mid"></div>
  </div>
</section>

<footer>
  Hecho con <span class="heart">♥</span> por <a href="#">SeaKingsStudios</a><br>
  <span style="opacity:.6">© 2026 · Todos los derechos reservados</span>
</footer>

<!-- PWA install prompt -->
<div class="install-prompt" id="install-prompt">
  <div class="ico">📲</div>
  <div class="txt">
    <b>Instala SeaKingsGames</b>
    Juega sin internet, sin anuncios pesados, con un toque
  </div>
  <button id="btn-install">Instalar</button>
  <button class="close" id="btn-install-close">✕</button>
</div>

<!-- Badge "instalado" cuando se abre como PWA -->
<div class="installed-badge" id="installed-badge">✓ APP INSTALADA</div>

<!-- Banner fijo 320x50 -->
<div class="ad-bottom" id="ad-bottom"></div>

<script>
/* =====================================================
   SeaKingsGames - Página principal
   ===================================================== */

/* ---------- AUDIO ---------- */
const Audio = {
  ctx:null, enabled:true,
  init(){ if(this.ctx) return; try{ this.ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} },
  tone(f,d=.08,t='triangle',v=.1){
    if(!this.enabled||!this.ctx) return;
    const now=this.ctx.currentTime;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=t; o.frequency.value=f;
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(v,now+.005);
    g.gain.exponentialRampToValueAtTime(.0001,now+d);
    o.connect(g).connect(this.ctx.destination);
    o.start(now); o.stop(now+d+.02);
  },
  hover(){ this.tone(900,.04,'sine',.06); },
  click(){ this.tone(660,.06,'triangle',.1); setTimeout(()=>this.tone(990,.07,'triangle',.1),40); },
  toggle(){ this.tone(this.enabled?780:520,.1,'sine',.12); },
};

const soundBtn = document.getElementById('sound-toggle');
soundBtn.onclick = () => {
  Audio.init();
  Audio.enabled = !Audio.enabled;
  soundBtn.textContent = Audio.enabled ? '🔊' : '🔇';
  Audio.toggle();
};

/* ---------- ADS ---------- */
const ADS = {
  banner50:  { key:'787e84f3bdee3100779130afe4802abc', width:320, height:50 },
  medium250: { key:'c2f164720365b5dc18fae25f1c594072', width:300, height:250 },
  large90:   { key:'0e595827f5881105adfd4a408fcb9f88', width:728, height:90 },
};
function loadAd(containerEl, config) {
  if (!containerEl || containerEl.dataset.loaded === '1') return;
  containerEl.dataset.loaded = '1';
  const html =
`<!DOCTYPE html><html><head>
<style>html,body{margin:0;padding:0;background:transparent;overflow:hidden}</style>
</head><body>
<script type="text/javascript">var atOptions=${JSON.stringify({
  key:config.key, format:'iframe', height:config.height, width:config.width, params:{}
})};<\/script>
<script type="text/javascript" src="https://www.highperformanceformat.com/${config.key}/invoke.js"><\/script>
</body></html>`;
  const ifr = document.createElement('iframe');
  ifr.srcdoc = html;
  ifr.width = config.width; ifr.height = config.height;
  ifr.scrolling = 'no'; ifr.setAttribute('frameborder','0');
  ifr.style.cssText = 'border:0;display:block;background:transparent;max-width:100%';
  containerEl.appendChild(ifr);
}

/* ---------- CATÁLOGO DE JUEGOS ---------- */
const GAMES = [
  {
    title: 'Tuercas Locas',
    desc:  'Ordena las piezas hexagonales en sus tornillos. 4 dificultades, niveles infinitos.',
    art:   '🔩', artClass: 'art-tuercas',
    href:  'tuercas-locas.html', badge: 'JUGAR', feature: true,
  },
  {
    title: 'Verdugo',
    desc:  'El clásico ahorcado en español. 8 categorías, 4 dificultades, funciona sin internet.',
    art:   '🪢', artClass: 'art-verdugo',
    href:  'verdugo.html', badge: 'JUGAR',
  },
  {
    title: 'Memoria',
    desc:  'Encuentra todos los pares antes de que te ganen los movimientos. 9 temas, 4 dificultades.',
    art:   '🧠', artClass: 'art-memoria',
    href:  'memoria.html', badge: 'JUGAR',
  },
  {
    title: 'Snake',
    desc:  'El clásico de la serpiente. 4 dificultades, modo con o sin paredes mortales.',
    art:   '🐍', artClass: 'art-snake',
    href:  'snake.html', badge: 'JUGAR',
  },
  {
    title: 'Numpuz',
    desc:  'El puzzle deslizante de números. Ordena del 1 al N en tableros de 3×3 hasta 6×6.',
    art:   '🧩', artClass: 'art-numpuz',
    href:  'numpuz.html', badge: 'JUGAR',
  },
];

/* ---------- RENDER ---------- */
const grid = document.getElementById('games-grid');
GAMES.forEach(g => {
  const a = document.createElement('a');
  a.className = 'card' + (g.feature ? ' feature' : '') + (g.soon ? ' soon' : '');
  a.href = g.href;
  a.innerHTML = `
    <div class="card-art ${g.artClass}">${g.art}</div>
    <div class="card-body">
      <h3>${g.title}</h3>
      <p>${g.desc}</p>
      <div class="card-meta">
        <span class="pill ${g.soon ? 'soon' : ''}">${g.badge}</span>
        ${g.soon ? '' : '<div class="play">▶</div>'}
      </div>
    </div>`;
  if (!g.soon) {
    a.addEventListener('mouseenter', () => { Audio.init(); Audio.hover(); });
    a.addEventListener('click', (e) => {
      Audio.init(); Audio.click();
      // pequeño delay para que se oiga el sonido antes de navegar
      if (g.href !== '#') {
        e.preventDefault();
        setTimeout(() => location.href = g.href, 120);
      }
    });
  }
  grid.appendChild(a);
});

/* ---------- CARGAR ADS ---------- */
window.addEventListener('load', () => {
  loadAd(document.getElementById('ad-top'),    ADS.large90);
  loadAd(document.getElementById('ad-mid'),    ADS.medium250);
  loadAd(document.getElementById('ad-bottom'), ADS.banner50);
});

/* =====================================================
   PWA: registro del service worker + install prompt
   ===================================================== */

// 1. Registrar service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => {
        // detectar actualizaciones disponibles
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              // hay una versión nueva disponible — opcional: notificar al usuario
              console.log('Nueva versión disponible. Recarga la app para actualizar.');
            }
          });
        });
      })
      .catch(err => console.warn('SW registro falló:', err));
  });
}

// 2. Detectar si ya está instalada (standalone)
const isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
                     window.navigator.standalone === true;
if (isStandalone) {
  document.getElementById('installed-badge').classList.add('show');
  // ocultar después de 3 segundos
  setTimeout(() => {
    document.getElementById('installed-badge').classList.remove('show');
  }, 3000);
}

// 3. Capturar el evento beforeinstallprompt y mostrar prompt personalizado
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // mostrar solo si no fue descartado antes
  if (!localStorage.getItem('sk-install-dismissed') && !isStandalone) {
    // pequeño delay para no abrumar
    setTimeout(() => {
      document.getElementById('install-prompt').classList.add('show');
    }, 2000);
  }
});

document.getElementById('btn-install').addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  document.getElementById('install-prompt').classList.remove('show');
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  if (outcome === 'accepted') {
    try { localStorage.setItem('sk-install-accepted', '1'); } catch(e) {}
  }
  deferredInstallPrompt = null;
});

document.getElementById('btn-install-close').addEventListener('click', () => {
  document.getElementById('install-prompt').classList.remove('show');
  try { localStorage.setItem('sk-install-dismissed', '1'); } catch(e) {}
});

// 4. Si la app se instala mientras está abierta
window.addEventListener('appinstalled', () => {
  document.getElementById('install-prompt').classList.remove('show');
  try { localStorage.setItem('sk-install-accepted', '1'); } catch(e) {}
});
</script>
</body>
</html>
