<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a3a">
<title>Tower · SeaKingsGames</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Bagel+Fat+One&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
  :root{
    --bg:#1a1a3a; --bg-2:#0a0a2a;
    --panel:#2a2a4a; --panel-2:#3a3a5a;
    --gold:#ffc83a; --gold-deep:#b88300;
    --green:#5fc99a; --red:#e85a6b;
    --text:#fff; --text-dim:#a8a8c8;
    --line:rgba(168,168,200,.2);
    --shadow:0 4px 0 rgba(0,0,0,.25), 0 8px 20px rgba(0,0,0,.3);
  }
  html,body{height:100%}
  body{
    font-family:'Fredoka',system-ui,sans-serif;
    /* gradiente vertical estilo cielo→noche para el sentido de "altura" */
    background:linear-gradient(180deg,#2a4068 0%,#3a3a5a 30%,var(--bg) 60%,var(--bg-2) 100%);
    background-attachment:fixed;
    color:var(--text); display:flex;flex-direction:column;min-height:100vh;
    overscroll-behavior:none;touch-action:manipulation;
  }
  button{font-family:inherit;border:none;cursor:pointer;color:inherit;background:none}

  .screen{display:none;flex-direction:column;min-height:100vh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .screen.active{display:flex}

  /* ---------- MENÚ ---------- */
  #menu{align-items:center;justify-content:center;gap:18px;padding:30px 24px 90px;flex:1}

  /* Stack decorativo de bloques */
  .tower-deco{
    display:flex;flex-direction:column-reverse;align-items:center;gap:3px;
    margin-bottom:8px;
  }
  .tower-deco div{
    height:14px;border-radius:3px;
    box-shadow:0 2px 0 rgba(0,0,0,.3);
  }
  .tower-deco div:nth-child(1){width:60px;background:linear-gradient(180deg,#e85a6b,#a03540)}
  .tower-deco div:nth-child(2){width:54px;background:linear-gradient(180deg,#ffc83a,#b88300)}
  .tower-deco div:nth-child(3){width:48px;background:linear-gradient(180deg,#5fc99a,#3a9a70)}
  .tower-deco div:nth-child(4){width:42px;background:linear-gradient(180deg,#5fa8e8,#2a7cb8)}
  .tower-deco div:nth-child(5){width:36px;background:linear-gradient(180deg,#a070e0,#6845c0)}

  .logo{
    font-family:'Bagel Fat One',sans-serif;
    font-size:clamp(38px,11vw,64px);line-height:.95;text-align:center;
    color:var(--gold);
    text-shadow:0 4px 0 #8a6f00, 0 8px 24px rgba(255,200,58,.35);
    letter-spacing:.5px;
  }
  .logo small{display:block;font-family:'Fredoka',sans-serif;font-weight:600;font-size:.28em;color:var(--text-dim);letter-spacing:3px;margin-top:8px;text-shadow:none}

  .section-title{font-size:13px;letter-spacing:3px;color:var(--text-dim);font-weight:600;margin-top:6px}

  .diff-list{display:flex;flex-direction:column;gap:10px;width:min(380px,92vw);margin-top:4px}
  .diff-btn{
    padding:14px 20px;border-radius:16px;background:var(--panel);
    box-shadow:var(--shadow);
    display:flex;justify-content:space-between;align-items:center;
    font-size:17px;font-weight:600;transition:transform .1s;
  }
  .diff-btn:active{transform:translateY(2px)}
  .diff-btn .tag{font-size:12px;font-weight:600;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,.12);color:var(--text-dim);letter-spacing:.5px}
  .diff-btn[data-d="facil"] .tag{color:#9be37d;background:rgba(155,227,125,.15)}
  .diff-btn[data-d="medio"] .tag{color:#7ec8ff;background:rgba(126,200,255,.15)}
  .diff-btn[data-d="dificil"] .tag{color:#ffa84a;background:rgba(255,168,74,.15)}
  .diff-btn[data-d="extraDificil"] .tag{color:#ff5e7a;background:rgba(255,94,122,.15)}

  .record-line{font-size:12px;color:var(--text-dim);font-weight:500;margin-top:3px;font-variant-numeric:tabular-nums}

  .ad-banner-bottom{
    position:fixed;left:0;right:0;bottom:env(safe-area-inset-bottom);
    display:flex;justify-content:center;align-items:center;padding:8px 0;
    background:rgba(10,10,42,.85);backdrop-filter:blur(8px);
    z-index:20;min-height:50px;border-top:1px solid var(--line);
  }
  .ad-banner-bottom iframe{max-width:100%}

  /* ---------- JUEGO ---------- */
  #game{flex:1;position:relative;overflow:hidden}
  #game .topbar{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 16px 4px;flex-shrink:0;gap:8px;
    position:relative;z-index:10;
  }
  .icon-btn{
    width:46px;height:46px;border-radius:50%;background:#fff;color:var(--bg-2);
    display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);
    font-size:22px;font-weight:700;transition:transform .1s;flex-shrink:0;
  }
  .icon-btn:active{transform:translateY(2px)}
  .icon-btn.small{width:38px;height:38px;font-size:16px}
  .level-title{text-align:center;flex:1;min-width:0}
  .level-title .badge{
    display:inline-block;font-size:10px;font-weight:600;letter-spacing:2px;
    padding:3px 10px;border-radius:10px;background:rgba(255,255,255,.12);color:var(--text-dim);
  }
  .level-title h1{font-size:18px;font-weight:700;color:#fff}

  /* GRAN INDICADOR DE PISO (sale grande arriba del canvas) */
  .floor-indicator{
    position:absolute;top:80px;left:50%;transform:translateX(-50%);
    z-index:6;text-align:center;pointer-events:none;
  }
  .floor-indicator .floor-num{
    font-family:'Bagel Fat One',sans-serif;
    font-size:64px;line-height:.9;color:rgba(255,255,255,.85);
    text-shadow:0 4px 0 rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.4);
    font-variant-numeric:tabular-nums;
    transition:transform .3s cubic-bezier(.34,1.56,.64,1), color .3s;
  }
  .floor-indicator .floor-num.bump{animation:floorBump .4s}
  .floor-indicator .floor-num.perfect{color:var(--gold);text-shadow:0 4px 0 #8a6f00, 0 0 24px rgba(255,200,58,.6)}
  @keyframes floorBump{0%{transform:scale(1)}30%{transform:scale(1.3)}100%{transform:scale(1)}}
  .floor-indicator .floor-lbl{
    font-size:11px;letter-spacing:4px;font-weight:600;
    color:rgba(255,255,255,.5);margin-top:-4px;
  }

  /* score / best en topbar */
  .stats-mini{
    position:absolute;top:74px;right:16px;
    text-align:right;z-index:6;font-variant-numeric:tabular-nums;
    pointer-events:none;
  }
  .stats-mini .lbl{font-size:9px;color:var(--text-dim);letter-spacing:2px;font-weight:600;line-height:1}
  .stats-mini .val{font-size:22px;font-weight:700;color:#fff;line-height:1.1}
  .stats-mini .val.gold{color:var(--gold)}
  .stats-mini .stat-row{margin-bottom:6px}

  /* CANVAS */
  .board-wrap{flex:1;display:flex;align-items:stretch;justify-content:center;position:relative}
  canvas#board{display:block;width:100%;height:100%;cursor:pointer}

  /* hint "TOCA" */
  .tap-hint{
    position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
    background:rgba(255,200,58,.95);color:#3a2400;
    padding:14px 28px;border-radius:30px;
    font-size:16px;font-weight:700;letter-spacing:2px;
    box-shadow:0 6px 0 var(--gold-deep), 0 8px 20px rgba(0,0,0,.4);
    pointer-events:none;z-index:7;
    animation:pulseTap 1.2s ease-in-out infinite;
  }
  @keyframes pulseTap{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.05)}}
  .tap-hint.hide{opacity:0;transition:opacity .3s}

  /* PERFECT! pop */
  .perfect-pop{
    position:absolute;left:50%;
    transform:translateX(-50%);
    font-family:'Bagel Fat One',sans-serif;
    font-size:36px;color:var(--gold);
    text-shadow:0 3px 0 #8a6f00, 0 0 20px rgba(255,200,58,.8);
    pointer-events:none;z-index:8;
    letter-spacing:2px;
  }

  /* combo indicator */
  .combo-indicator{
    position:absolute;top:160px;left:50%;transform:translateX(-50%);
    background:rgba(255,200,58,.2);color:var(--gold);
    border:2px solid var(--gold);
    padding:6px 14px;border-radius:20px;
    font-size:13px;font-weight:700;letter-spacing:1.5px;
    z-index:6;pointer-events:none;
    display:none;
    box-shadow:0 0 16px rgba(255,200,58,.4);
  }
  .combo-indicator.show{display:block;animation:comboIn .3s cubic-bezier(.34,1.56,.64,1)}
  @keyframes comboIn{from{transform:translateX(-50%) scale(0.5);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}

  /* ---------- MODALES ---------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
  .modal-overlay.active{display:flex}
  .modal{
    background:linear-gradient(180deg,var(--panel) 0%,var(--bg-2) 100%);
    border:1px solid var(--line);
    border-radius:24px;padding:24px 20px;width:min(380px,100%);max-height:90vh;overflow-y:auto;
    text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);
    animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
  }
  .modal .emoji{font-size:60px;margin-bottom:4px;display:inline-block}
  .modal h2{font-family:'Bagel Fat One',sans-serif;color:var(--gold);font-size:28px;line-height:1;margin-bottom:6px}
  .modal h2.lose{color:var(--red)}
  .modal p{color:var(--text-dim);font-size:15px;margin-bottom:14px}

  .achievement-card{
    background:linear-gradient(135deg,var(--gold) 0%,#e0a020 100%);
    border-radius:18px;padding:18px;margin:12px 0;color:#3a2400;
    box-shadow:0 8px 0 var(--gold-deep), inset 0 -2px 0 rgba(255,255,255,.3);
  }
  .ach-title{font-size:11px;letter-spacing:3px;font-weight:700;opacity:.7;margin-bottom:8px}
  .ach-stats{display:flex;justify-content:space-around;gap:8px}
  .ach-stat{flex:1}
  .ach-num{font-family:'Bagel Fat One',sans-serif;font-size:32px;line-height:1;font-variant-numeric:tabular-nums}
  .ach-lbl{font-size:10px;font-weight:600;opacity:.7;letter-spacing:1px;margin-top:4px}
  .new-record{display:inline-block;background:#e91e63;color:#fff;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:1.5px;margin-bottom:6px;animation:wobble .6s ease-in-out infinite}
  @keyframes wobble{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}

  .ad-label{font-size:10px;color:var(--text-dim);opacity:.6;letter-spacing:2px;margin:8px 0 4px}
  .ad-slot{display:flex;justify-content:center;align-items:center;min-height:250px;background:rgba(0,0,0,.2);border-radius:12px;overflow:hidden}
  .ad-slot iframe{max-width:100%;border:0}

  .modal-btns{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .btn-row{display:flex;gap:8px}
  .btn-row .btn-secondary{flex:1}
  .btn-primary{padding:14px 22px;border-radius:14px;background:linear-gradient(180deg,var(--gold) 0%,#e0a020 100%);color:#3a2400;font-weight:700;font-size:17px;box-shadow:0 4px 0 var(--gold-deep)}
  .btn-secondary{padding:13px 18px;border-radius:14px;background:rgba(255,255,255,.1);color:#fff;font-weight:600;font-size:15px;box-shadow:0 4px 0 rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;gap:6px}
  .btn-ghost{padding:10px;color:var(--text-dim);font-size:14px;font-weight:500}

  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
  .bounce{animation:bounce 1.2s infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
</style>
</head>
<body>

<!-- ====================== MENÚ ====================== -->
<section id="menu" class="screen active">
  <div class="tower-deco">
    <div></div><div></div><div></div><div></div><div></div>
  </div>
  <div class="logo">TOWER<small>SeaKingsGames</small></div>

  <div class="section-title">DIFICULTAD</div>
  <div class="diff-list" id="diff-list"></div>

  <a href="index.html" style="color:var(--text-dim);font-size:14px;text-decoration:none;margin-top:8px">← Volver al inicio</a>
  <div class="ad-banner-bottom" id="ad-bottom-menu"></div>
</section>

<!-- ====================== JUEGO ====================== -->
<section id="game" class="screen">
  <div class="topbar">
    <button class="icon-btn" id="btn-back">‹</button>
    <div class="level-title">
      <div class="badge" id="diff-badge">FÁCIL</div>
      <h1>Tower</h1>
    </div>
    <button class="icon-btn small" id="btn-sound">🔊</button>
  </div>

  <div class="floor-indicator">
    <div class="floor-num" id="floor-num">0</div>
    <div class="floor-lbl">PISO</div>
  </div>

  <div class="stats-mini">
    <div class="stat-row">
      <div class="lbl">PUNTOS</div>
      <div class="val" id="stat-score">0</div>
    </div>
    <div class="stat-row">
      <div class="lbl">RÉCORD</div>
      <div class="val gold" id="stat-best">0</div>
    </div>
  </div>

  <div class="combo-indicator" id="combo-indicator">PERFECT ×2</div>

  <div class="board-wrap">
    <canvas id="board"></canvas>
    <div class="tap-hint" id="tap-hint">TOCA PARA APILAR</div>
  </div>
</section>

<!-- ====================== MODAL: GAME OVER ====================== -->
<div class="modal-overlay" id="modal-gameover">
  <div class="modal">
    <div class="emoji" id="go-emoji">💥</div>
    <div id="new-record-tag" style="display:none"><span class="new-record">¡NUEVO RÉCORD!</span></div>
    <h2 class="lose" id="go-title">¡Se cayó la torre!</h2>
    <p id="go-msg">El bloque se quedó sin apoyo</p>
    <div class="achievement-card">
      <div class="ach-title">TU TORRE</div>
      <div class="ach-stats">
        <div class="ach-stat"><div class="ach-num" id="go-floor">0</div><div class="ach-lbl">PISOS</div></div>
        <div class="ach-stat"><div class="ach-num" id="go-score">0</div><div class="ach-lbl">PUNTOS</div></div>
        <div class="ach-stat"><div class="ach-num" id="go-perfect">0</div><div class="ach-lbl">PERFECTOS</div></div>
      </div>
    </div>
    <div class="ad-label">PUBLICIDAD</div>
    <div class="ad-slot" id="ad-go"></div>
    <div class="modal-btns">
      <button class="btn-primary" id="btn-retry">Otra ronda →</button>
      <div class="btn-row">
        <button class="btn-secondary" id="btn-share">📤 Compartir</button>
        <button class="btn-secondary" id="btn-save">💾 Guardar</button>
      </div>
      <button class="btn-ghost" id="btn-menu-go">Cambiar dificultad</button>
    </div>
  </div>
</div>

<script>
/* =====================================================
   TOWER · SeaKingsGames
   Apila bloques que se mueven; lo que sobresale se corta
   ===================================================== */

/* ---------- AUDIO ---------- */
const SFX = {
  ctx:null, enabled: localStorage.getItem('sk-sound') !== '0',
  init(){ if(this.ctx) return; try{ this.ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} },
  tone(f,d=.1,t='sine',v=.15,attack=.005){
    if(!this.enabled||!this.ctx) return;
    const now=this.ctx.currentTime, o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=t; o.frequency.value=f;
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(v,now+attack);
    g.gain.exponentialRampToValueAtTime(.0001,now+d);
    o.connect(g).connect(this.ctx.destination);
    o.start(now); o.stop(now+d+.02);
  },
  // tono sube con el piso para dar sensación de progreso
  drop(floor, miss=0){
    // miss = 0 (perfecto), 0.1-0.5 (regular), >0.5 (casi falla)
    const base = 440 + floor*15;
    const f = base * (1 - miss*0.3);
    this.tone(f, 0.08, 'sine', 0.13);
    setTimeout(()=>this.tone(f*0.5, 0.06, 'triangle', 0.10), 40);
  },
  perfect(combo){
    // arpegio mayor que sube con el combo
    const base = 660 + Math.min(combo*40, 400);
    [0, 1.25, 1.5, 2].forEach((m,i)=>setTimeout(()=>this.tone(base*m, 0.1, 'sine', 0.15), i*50));
  },
  cut(){
    // chasquido al cortar el sobrante
    this.tone(180, 0.04, 'sawtooth', 0.08);
  },
  fall(){
    // bloque cayendo al vacío
    let f = 440;
    const id = setInterval(()=>{ this.tone(f, 0.05, 'triangle', 0.10); f *= 0.85; }, 50);
    setTimeout(()=>clearInterval(id), 350);
  },
  crash(){ [220,180,140,110].forEach((f,i)=>setTimeout(()=>this.tone(f,.15,'sawtooth',.14),i*80)); },
  tap(){ this.tone(800,.03,'triangle',.08); },
  newRec(){ [659,784,1047,1319].forEach((f,i)=>setTimeout(()=>this.tone(f,.14,'triangle',.15),i*70)); },
};

/* ---------- ADS ---------- */
const ADS = {
  banner50:  { key:'787e84f3bdee3100779130afe4802abc', width:320, height:50 },
  medium250: { key:'c2f164720365b5dc18fae25f1c594072', width:300, height:250 },
};
function loadAd(el, cfg){
  if(!el || el.dataset.loaded === '1') return;
  el.dataset.loaded = '1';
  const html =
`<!DOCTYPE html><html><head><style>html,body{margin:0;padding:0;background:transparent;overflow:hidden}</style></head><body>
<script type="text/javascript">var atOptions=${JSON.stringify({key:cfg.key,format:'iframe',height:cfg.height,width:cfg.width,params:{}})};<\/script>
<script type="text/javascript" src="https://www.highperformanceformat.com/${cfg.key}/invoke.js"><\/script>
</body></html>`;
  const ifr = document.createElement('iframe');
  ifr.srcdoc = html; ifr.width = cfg.width; ifr.height = cfg.height;
  ifr.scrolling = 'no'; ifr.setAttribute('frameborder','0');
  ifr.style.cssText = 'border:0;display:block;background:transparent;max-width:100%';
  el.appendChild(ifr);
}

/* ---------- CONFIG DIFICULTAD ---------- */
const DIFFICULTIES = {
  facil:        { speed:1.5, accel:0.02, perfectTol:0.04, baseW:160, label:'FÁCIL'         },
  medio:        { speed:2.5, accel:0.04, perfectTol:0.03, baseW:140, label:'MEDIO'         },
  dificil:      { speed:3.8, accel:0.06, perfectTol:0.022,baseW:120, label:'DIFÍCIL'       },
  extraDificil: { speed:5.2, accel:0.09, perfectTol:0.018,baseW:100, label:'EXTRA DIFÍCIL' },
};

/* paleta de colores cíclica para los bloques */
const COLORS = [
  ['#e85a6b','#a03540'], // rojo
  ['#ffc83a','#b88300'], // dorado
  ['#5fc99a','#3a9a70'], // verde
  ['#5fa8e8','#2a7cb8'], // azul
  ['#a070e0','#6845c0'], // morado
  ['#ff8a5c','#c85a30'], // naranja
  ['#5fd0d0','#2a9a9a'], // cyan
];

/* ---------- ESTADO ---------- */
const state = {
  difficulty:'facil',
  blocks:[],          // [{x, y, w, color, perfect}] -- todos los bloques apilados
  movingBlock:null,   // {x, y, w, dir(+1/-1), color}
  blockH: 28,         // altura de cada bloque
  speed: 1.5,
  accel: 0.02,
  perfectTol: 0.04,
  floor: 0,           // piso actual (0 = base)
  score: 0,
  perfectStreak: 0,
  combo: 0,
  cameraY: 0,         // desplazamiento de cámara (para que la torre quede a la vista)
  particles: [],
  fallingPieces: [],  // sobrantes cortados que caen
  running:false, gameover:false,
  best: 0,
};
const $ = id => document.getElementById(id);
const canvas = $('board');
const ctx = canvas.getContext('2d');
let cw = 0, ch = 0, dpr = 1;
let rafId = null;

/* ---------- UTIL ---------- */
function clearText(el){ el.textContent = ''; }

/* ---------- RESIZE CANVAS ---------- */
function resizeCanvas(){
  dpr = devicePixelRatio || 1;
  const wrap = canvas.parentElement;
  cw = wrap.clientWidth;
  ch = wrap.clientHeight;
  if (cw <= 0 || ch <= 0) return;
  canvas.width = cw * dpr;
  canvas.height = ch * dpr;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', () => {
  if ($('game').classList.contains('active')) resizeCanvas();
});

/* ---------- NUEVA PARTIDA ---------- */
function newGame(){
  const cfg = DIFFICULTIES[state.difficulty];
  state.speed = cfg.speed;
  state.accel = cfg.accel;
  state.perfectTol = cfg.perfectTol;
  state.floor = 0;
  state.score = 0;
  state.perfectStreak = 0;
  state.combo = 0;
  state.cameraY = 0;
  state.particles = [];
  state.fallingPieces = [];
  state.blocks = [];
  state.gameover = false;
  state.running = true;

  // base block (ya colocada): centrada en pantalla, ancho base
  const baseW = cfg.baseW;
  const baseX = (cw - baseW) / 2;
  const baseY = ch - 120;  // 120px desde el fondo
  state.blocks.push({
    x: baseX, y: baseY, w: baseW,
    color: COLORS[0], perfect: false,
  });

  // primer bloque en movimiento
  spawnNextBlock();

  state.best = parseInt(localStorage.getItem(`sk-tower-best-${state.difficulty}`) || '0', 10);
  $('stat-best').textContent = state.best;
  $('stat-score').textContent = '0';
  $('floor-num').textContent = '0';
  $('floor-num').classList.remove('perfect');
  $('diff-badge').textContent = cfg.label;
  $('tap-hint').classList.remove('hide');
  $('combo-indicator').classList.remove('show');
}

function spawnNextBlock(){
  const prev = state.blocks[state.blocks.length - 1];
  const color = COLORS[(state.floor + 1) % COLORS.length];
  // posición Y arriba del anterior
  const y = prev.y - state.blockH;
  // empezar desde un lado aleatorio
  const fromLeft = Math.random() < 0.5;
  const startX = fromLeft ? -prev.w : cw;
  state.movingBlock = {
    x: startX,
    y: y,
    w: prev.w,
    color: color,
    dir: fromLeft ? 1 : -1,
  };
}

/* ---------- LOOP ---------- */
function loop(){
  rafId = requestAnimationFrame(loop);
  if (!state.running) { draw(); return; }
  update();
  draw();
}

function update(){
  // mover bloque
  if (state.movingBlock) {
    state.movingBlock.x += state.movingBlock.dir * state.speed;
    // rebote en bordes
    if (state.movingBlock.x <= 0) {
      state.movingBlock.x = 0;
      state.movingBlock.dir = 1;
    } else if (state.movingBlock.x + state.movingBlock.w >= cw) {
      state.movingBlock.x = cw - state.movingBlock.w;
      state.movingBlock.dir = -1;
    }
  }

  // animar cámara (lerp suave hacia cameraY objetivo)
  const targetCamY = computeCameraTarget();
  state.cameraY += (targetCamY - state.cameraY) * 0.12;

  // partículas
  state.particles = state.particles.filter(p => {
    p.vy += 600 * (1/60); // gravedad
    p.x += p.vx * (1/60);
    p.y += p.vy * (1/60);
    p.life -= 1/60;
    return p.life > 0;
  });

  // piezas cayendo (los sobrantes)
  state.fallingPieces = state.fallingPieces.filter(p => {
    p.vy += 800 * (1/60);
    p.vx *= 0.99;
    p.x += p.vx * (1/60);
    p.y += p.vy * (1/60);
    p.rot += p.rotV * (1/60);
    return p.y < ch + 200;
  });
}

function computeCameraTarget(){
  // queremos que el bloque actual (movingBlock o último colocado) quede a 40% de altura desde arriba
  const target = state.movingBlock || state.blocks[state.blocks.length - 1];
  if (!target) return 0;
  const screenTargetY = ch * 0.4;
  return target.y - screenTargetY;
}

/* ---------- DRAW ---------- */
function draw(){
  if (cw <= 0 || ch <= 0) return;
  ctx.clearRect(0, 0, cw, ch);

  // estrellas de fondo decorativas (sutil)
  drawStars();

  ctx.save();
  ctx.translate(0, -state.cameraY);

  // dibujar bloques apilados
  for (let i = 0; i < state.blocks.length; i++) {
    drawBlock(state.blocks[i], i === state.blocks.length - 1);
  }

  // bloque en movimiento
  if (state.movingBlock) drawBlock(state.movingBlock, false, true);

  // piezas cayendo
  for (const p of state.fallingPieces) drawFalling(p);

  // partículas
  for (const p of state.particles) {
    const a = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = p.color.replace('rgb(', 'rgba(').replace(')', `,${a})`);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * a, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

function drawStars(){
  // pequeñas estrellas decorativas (sin moverse con cámara)
  const seed = 1234;
  for (let i = 0; i < 30; i++) {
    const sx = (((i * 91 + seed) * 7919) % cw);
    const sy = (((i * 31 + seed) * 6151) % ch);
    const t = (Math.sin(performance.now()/1000 + i) + 1) / 2;
    ctx.fillStyle = `rgba(255,255,255,${0.1 + t*0.15})`;
    ctx.fillRect(sx, sy, 2, 2);
  }
}

function drawBlock(b, isTop, isMoving){
  // gradiente vertical
  const grd = ctx.createLinearGradient(0, b.y, 0, b.y + state.blockH);
  grd.addColorStop(0, b.color[0]);
  grd.addColorStop(1, b.color[1]);
  ctx.fillStyle = grd;
  // sombra
  ctx.shadowColor = 'rgba(0,0,0,.3)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 4;
  ctx.fillRect(b.x, b.y, b.w, state.blockH);
  ctx.shadowColor = 'transparent';
  // brillo superior
  ctx.fillStyle = 'rgba(255,255,255,.2)';
  ctx.fillRect(b.x, b.y, b.w, state.blockH * 0.35);
  // borde
  ctx.strokeStyle = 'rgba(0,0,0,.25)';
  ctx.lineWidth = 1;
  ctx.strokeRect(b.x + 0.5, b.y + 0.5, b.w - 1, state.blockH - 1);
  // si era perfecto, brillo extra
  if (b.perfect) {
    ctx.strokeStyle = 'rgba(255,200,58,.6)';
    ctx.lineWidth = 2;
    ctx.strokeRect(b.x + 1, b.y + 1, b.w - 2, state.blockH - 2);
  }
}

function drawFalling(p){
  ctx.save();
  ctx.translate(p.x + p.w/2, p.y + state.blockH/2);
  ctx.rotate(p.rot);
  const grd = ctx.createLinearGradient(0, -state.blockH/2, 0, state.blockH/2);
  grd.addColorStop(0, p.color[0]);
  grd.addColorStop(1, p.color[1]);
  ctx.fillStyle = grd;
  ctx.fillRect(-p.w/2, -state.blockH/2, p.w, state.blockH);
  ctx.restore();
}

/* ---------- ACCIÓN: COLOCAR BLOQUE ---------- */
function dropBlock(){
  if (!state.running || state.gameover || !state.movingBlock) return;
  $('tap-hint').classList.add('hide');

  const mov = state.movingBlock;
  const prev = state.blocks[state.blocks.length - 1];

  // intersección entre el bloque en movimiento y el anterior
  const overlapStart = Math.max(mov.x, prev.x);
  const overlapEnd = Math.min(mov.x + mov.w, prev.x + prev.w);
  const overlap = overlapEnd - overlapStart;

  if (overlap <= 0) {
    // falló completamente -> cae el bloque entero -> game over
    return endGame(mov);
  }

  const newW = overlap;
  const offset = Math.abs(mov.x - prev.x); // qué tan desalineado quedó
  const isPerfect = offset <= state.perfectTol * prev.w;

  let placedBlock;
  if (isPerfect) {
    // colocación perfecta: ancho NO se reduce, mantiene el del anterior
    placedBlock = {
      x: prev.x,
      y: mov.y,
      w: prev.w,
      color: mov.color,
      perfect: true,
    };
    state.perfectStreak++;
    state.combo = state.perfectStreak;
    state.score += 10 + state.combo * 2;
    SFX.perfect(state.combo);
    showPerfectPop(prev.x + prev.w/2, mov.y);
    $('floor-num').classList.add('perfect');
    setTimeout(() => $('floor-num').classList.remove('perfect'), 600);
    if (state.combo >= 2) showCombo(state.combo);
    spawnSparkles(prev.x + prev.w/2, mov.y, prev.w);
  } else {
    // colocación normal: se corta el sobrante, ancho se reduce
    placedBlock = {
      x: overlapStart,
      y: mov.y,
      w: newW,
      color: mov.color,
      perfect: false,
    };
    state.perfectStreak = 0;
    state.combo = 0;
    state.score += 5;
    SFX.drop(state.floor, offset / prev.w);
    SFX.cut();
    // generar pieza que cae (el sobrante)
    spawnFallingPiece(mov, placedBlock);
    $('combo-indicator').classList.remove('show');
  }

  state.blocks.push(placedBlock);
  state.floor++;

  // animar el contador
  $('floor-num').textContent = state.floor;
  $('floor-num').classList.remove('bump');
  void $('floor-num').offsetWidth; // restart animation
  $('floor-num').classList.add('bump');
  $('stat-score').textContent = state.score;

  // aumentar dificultad
  state.speed += state.accel;

  // siguiente bloque
  spawnNextBlock();
}

function spawnFallingPiece(mov, placed){
  // calcular qué parte del movingBlock se cayó
  const placedEnd = placed.x + placed.w;
  const movEnd = mov.x + mov.w;
  let fx, fw;
  if (mov.x < placed.x) {
    fx = mov.x;
    fw = placed.x - mov.x;
  } else {
    fx = placedEnd;
    fw = movEnd - placedEnd;
  }
  if (fw <= 0) return;
  state.fallingPieces.push({
    x: fx, y: mov.y, w: fw,
    color: mov.color,
    vx: (Math.random() - 0.5) * 80 + (mov.x < placed.x ? -100 : 100),
    vy: -50,
    rot: 0, rotV: (Math.random() - 0.5) * 8,
  });
}

function spawnSparkles(cx, cy, w){
  // ráfaga de chispas doradas en perfectos
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 80 + Math.random() * 120;
    state.particles.push({
      x: cx + (Math.random() - 0.5) * w,
      y: cy + state.blockH/2,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 80,
      r: 3 + Math.random() * 3,
      color: Math.random() < 0.5 ? 'rgb(255,200,58)' : 'rgb(255,255,255)',
      life: 0.7,
      maxLife: 0.7,
    });
  }
}

function showPerfectPop(x, y){
  const el = document.createElement('div');
  el.className = 'perfect-pop';
  el.textContent = 'PERFECT';
  $('game').appendChild(el);
  // posicionar respecto al canvas/cameraY
  const yOnScreen = y - state.cameraY - 30;
  el.style.top = yOnScreen + 'px';
  // animación
  el.animate([
    { transform:'translateX(-50%) scale(0.6) translateY(0)', opacity:0 },
    { transform:'translateX(-50%) scale(1.1) translateY(-10px)', opacity:1, offset:0.3 },
    { transform:'translateX(-50%) scale(1) translateY(-40px)', opacity:0 },
  ], { duration:900, easing:'cubic-bezier(.34,1.56,.64,1)' });
  setTimeout(() => el.remove(), 900);
}

function showCombo(n){
  const ind = $('combo-indicator');
  ind.textContent = `PERFECT ×${n}`;
  ind.classList.remove('show');
  void ind.offsetWidth;
  ind.classList.add('show');
}

/* ---------- GAME OVER ---------- */
function endGame(mov){
  state.gameover = true;
  state.running = false;
  SFX.fall();
  setTimeout(() => SFX.crash(), 200);
  // animar el bloque cayendo (lo metemos como fallingPiece para que la animación lo lleve)
  state.fallingPieces.push({
    x: mov.x, y: mov.y, w: mov.w,
    color: mov.color,
    vx: mov.dir * 20,
    vy: -30,
    rot: 0, rotV: (Math.random() - 0.5) * 6,
  });
  state.movingBlock = null;
  setTimeout(onGameOver, 1100);
}

function onGameOver(){
  // contar perfectos
  const perfects = state.blocks.filter(b => b.perfect).length;
  const recKey = `sk-tower-best-${state.difficulty}`;
  const prevBest = parseInt(localStorage.getItem(recKey) || '0', 10);
  const isNewRec = state.score > prevBest;
  if (isNewRec) {
    try{ localStorage.setItem(recKey, String(state.score)); }catch(e){}
    try{ localStorage.setItem(recKey + '-info', JSON.stringify({floor:state.floor, perfects, date:Date.now()})); }catch(e){}
    setTimeout(()=>SFX.newRec(), 700);
  }
  $('go-floor').textContent = state.floor;
  $('go-score').textContent = state.score;
  $('go-perfect').textContent = perfects;
  $('new-record-tag').style.display = isNewRec ? 'block' : 'none';
  if (isNewRec) {
    $('go-emoji').textContent = '🎉';
    $('go-title').textContent = '¡Nuevo récord!';
    $('go-title').classList.remove('lose');
    $('go-msg').textContent = `Tu mejor torre en ${DIFFICULTIES[state.difficulty].label}`;
  } else {
    $('go-emoji').textContent = '💥';
    $('go-title').textContent = '¡Se cayó la torre!';
    $('go-title').classList.add('lose');
    $('go-msg').textContent = 'El bloque se quedó sin apoyo';
  }
  openModal('modal-gameover','ad-go',ADS.medium250);
}

/* ---------- INPUT ---------- */
canvas.addEventListener('click', () => { SFX.init(); dropBlock(); });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  SFX.init();
  dropBlock();
}, {passive:false});
document.addEventListener('keydown', e => {
  if (!$('game').classList.contains('active')) return;
  if (e.key === ' ' || e.key === 'ArrowDown' || e.key === 'Enter') {
    e.preventDefault();
    dropBlock();
  }
});

/* ---------- COMPARTIR / GUARDAR ---------- */
function genAchievementCanvas(){
  const c = document.createElement('canvas');
  c.width = 1080; c.height = 1080;
  const x = c.getContext('2d');
  const g = x.createLinearGradient(0,0,0,1080);
  g.addColorStop(0,'#2a4068'); g.addColorStop(0.5,'#2a2a4a'); g.addColorStop(1,'#0a0a2a');
  x.fillStyle = g; x.fillRect(0,0,1080,1080);
  x.strokeStyle = '#ffc83a'; x.lineWidth = 18; x.strokeRect(40,40,1000,1000);
  x.font = '180px sans-serif'; x.textAlign = 'center';
  x.fillText('🗼', 540, 240);
  x.fillStyle = '#ffc83a'; x.font = 'bold 56px sans-serif';
  x.fillText('¡TORRE CONSTRUIDA!', 540, 330);
  x.fillStyle = '#fff'; x.font = 'bold 90px sans-serif';
  x.fillText('Tower', 540, 440);
  x.fillStyle = '#a8a8c8'; x.font = 'bold 42px sans-serif';
  x.fillText(DIFFICULTIES[state.difficulty].label, 540, 510);
  const perfects = state.blocks.filter(b => b.perfect).length;
  x.fillStyle = '#ffc83a';
  roundRect(x, 90, 600, 900, 280, 30); x.fill();
  x.fillStyle = '#3a2400'; x.font = 'bold 90px sans-serif';
  x.fillText(state.floor, 260, 760);
  x.fillText(state.score, 540, 760);
  x.fillText(perfects, 820, 760);
  x.fillStyle = 'rgba(58,36,0,.7)'; x.font = 'bold 26px sans-serif';
  x.fillText('PISOS', 260, 815);
  x.fillText('PUNTOS', 540, 815);
  x.fillText('PERFECTOS', 820, 815);
  x.fillStyle = '#ffc83a'; x.font = 'bold 48px sans-serif';
  x.fillText('SeaKingsGames', 540, 990);
  return c;
}
function roundRect(c, x, y, w, h, r){
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
  c.closePath();
}
async function shareAchievement(){
  const c = genAchievementCanvas();
  const perfects = state.blocks.filter(b => b.perfect).length;
  const text = `🗼 Tower · ${DIFFICULTIES[state.difficulty].label}\n🏢 ${state.floor} pisos · ⭐ ${perfects} perfectos · 💎 ${state.score} pts\nJuega: SeaKingsGames`;
  c.toBlob(async (blob) => {
    const file = new File([blob], 'logro.png', {type:'image/png'});
    try{
      if(navigator.canShare && navigator.canShare({files:[file]})) await navigator.share({files:[file], text});
      else if(navigator.share) await navigator.share({text});
      else {
        downloadCanvas(c);
        if(navigator.clipboard) await navigator.clipboard.writeText(text);
        alert('Imagen descargada y texto copiado');
      }
    }catch(e){}
  }, 'image/png');
}
function saveAchievement(){ downloadCanvas(genAchievementCanvas()); }
function downloadCanvas(c){
  c.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `logro-tower-${Date.now()}.png`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  }, 'image/png');
}

/* ---------- MODALES ---------- */
function openModal(id, adId, adCfg){ $(id).classList.add('active'); if(adId) loadAd($(adId), adCfg); }
function closeModal(id){ $(id).classList.remove('active'); }

/* ---------- MENÚ ---------- */
function buildDiffMenu(){
  const list = $('diff-list');
  list.innerHTML = '';
  Object.entries(DIFFICULTIES).forEach(([k,cfg]) => {
    const best = parseInt(localStorage.getItem(`sk-tower-best-${k}`) || '0', 10);
    let info = null;
    try{ info = JSON.parse(localStorage.getItem(`sk-tower-best-${k}-info`) || 'null'); }catch(e){}
    const btn = document.createElement('button');
    btn.className = 'diff-btn'; btn.dataset.d = k;
    const label = cfg.label.charAt(0)+cfg.label.slice(1).toLowerCase().replace('difícil','Difícil').replace('extra ','Extra ');
    let recLine = '';
    if (best > 0) {
      const pisos = info ? ` · ${info.floor} pisos` : '';
      recLine = `<div class="record-line">🏆 ${best} pts${pisos}</div>`;
    }
    btn.innerHTML = `<div><div>${label}</div>${recLine}</div><span class="tag">v${cfg.speed}</span>`;
    btn.onclick = () => {
      SFX.init(); SFX.tap();
      state.difficulty = k;
      startGame();
    };
    list.appendChild(btn);
  });
}

function startGame(){
  showScreen('game');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    resizeCanvas();
    newGame();
    if (!rafId) rafId = requestAnimationFrame(loop);
  }));
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(name).classList.add('active');
}

/* ---------- BOTONES ---------- */
$('btn-back').onclick = () => { SFX.tap(); state.running = false; buildDiffMenu(); showScreen('menu'); };
$('btn-sound').onclick = () => {
  SFX.init();
  SFX.enabled = !SFX.enabled;
  localStorage.setItem('sk-sound', SFX.enabled ? '1' : '0');
  $('btn-sound').textContent = SFX.enabled ? '🔊' : '🔇';
  if(SFX.enabled) SFX.tap();
};
$('btn-sound').textContent = SFX.enabled ? '🔊' : '🔇';

$('btn-retry').onclick = () => { closeModal('modal-gameover'); startGame(); SFX.tap(); };
$('btn-share').onclick = () => { SFX.tap(); shareAchievement(); };
$('btn-save').onclick = () => { SFX.tap(); saveAchievement(); };
$('btn-menu-go').onclick = () => { closeModal('modal-gameover'); buildDiffMenu(); showScreen('menu'); SFX.tap(); };

/* ---------- SERVICE WORKER ---------- */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

/* ---------- INIT ---------- */
buildDiffMenu();
window.addEventListener('load', () => { loadAd($('ad-bottom-menu'), ADS.banner50); });
</script>
